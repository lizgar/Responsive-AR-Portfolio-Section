<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Portafolio WebAR - MindAR</title>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      a-scene {
        width: 100%;
        height: 100%;
      }

      .ar-message {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
      }
      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 20;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 10px 14px;
        border-radius: 999px;
        text-decoration: none;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="message" class="ar-message">
      Apunta la cámara hacia la imagen marcador
    </div>

    <a href="./index.html" class="back-button">
  ← Volver al portafolio
    </a>
    <a-scene
      mindar-image="imageTargetSrc: https://lizgar.github.io/ImgDesignare/targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="0 0 0 " position="0 0 0.1" scale="0.005 0.005 0.005" src="https://lizgar.github.io/ImgDesignare/scene.gltf"
          animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"
        >
      </a-entity>
     
    </a-scene>

    <script>
      const target = document.querySelector("#target");
      const message = document.querySelector("#message");

      target.addEventListener("targetFound", () => {
        console.log("[MindAR] Imagen detectada");
        message.textContent = "Imagen detectada";
      });

      target.addEventListener("targetLost", () => {
        console.log("[MindAR] Imagen perdida");
        message.textContent = "Apunta la cámara hacia la imagen marcador";
      });
    </script>
  </body>
</html>
