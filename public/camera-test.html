<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Prueba de cámara</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        background: #000;
      }

      #status {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="status">Solicitando cámara...</div>
    <video id="video" autoplay playsinline muted></video>

    <script>
      const statusBox = document.getElementById("status");
      const video = document.getElementById("video");

      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "environment"
            },
            audio: false
          });

          video.srcObject = stream;
          statusBox.textContent = "Cámara funcionando correctamente";
        } catch (error) {
          console.error(error);
          statusBox.textContent =
            "Error de cámara: " + error.name + " - " + error.message;
        }
      }

      startCamera();
    </script>
  </body>
</html>
